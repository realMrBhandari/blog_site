{% extends "base.html" %}
{% load static %}

{% block css_files %}
    <link rel="stylesheet" href="{% static "blog/css/post-detail.css" %}">
{% endblock  %}

{% block page_content %}
    <section id="summary">
        <h2>{{post.title}}</h2>
        <article>
            <img src="{% static "blog/images/"|add:post.image %}" alt="Post Title">
            <address>By {{post.author | title}}</address>
            <div>
                Last updated on <time> {{post.date | date:"M j Y"}}</time>
            </div>
        </article>
    </section>
    <main>
        {{post.content | linebreaks}}
    </main>
{% endblock  %}
